<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Interface - BTI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="welcome-modal" class="modal">
        <div class="modal-content">
            <h2>Sistema Solar Interativo</h2>
            <hr>
            <p><strong>Navegação:</strong> Clique e arraste para mover o universo.</p>
            <p><strong>Exploração:</strong> Clique nos astros para detalhes.</p>
            <p><strong>Atalhos:</strong> [ESC] Fechar painéis | [F5] Reiniciar</p>
            <button onclick="closeWelcome()" class="btn-iniciar">Iniciar Exploração</button>
        </div>
    </div>

    <div id="viewport">
        <div id="universo" class="universo">
            <div class="sol" onclick="mostrarInfo('Sol', 'Estrela central.', 'assets/img/sol.jpg')">
                <span class="label-astro">SOL</span>
            </div>

            <div class="orbita-terra">
                <div class="planeta terra" onclick="mostrarInfo('Terra', 'Nossa casa.', 'assets/img/terra.jpg')">
                    <span class="label-astro">TERRA</span>
                    <div class="area-lua">
                        <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Lua', 'Satélite natural.', 'assets/img/lua.jpg')"></div>
                    </div>
                </div>
            </div>

            <div class="orbita-saturno">
                <div class="planeta saturno" onclick="mostrarInfo('Saturno', 'Senhor dos anéis.', 'assets/img/saturno.jpg')">
                    <span class="label-astro">SATURNO</span>
                    <div class="aneis-saturno"></div>
                </div>
            </div>

            <div class="orbita-plutao">
                <div class="planeta plutao" onclick="mostrarInfo('Plutão', 'O eterno nono planeta.', 'assets/img/plutao.jpg')">
                    <span class="label-astro">PLUTÃO</span>
                </div>
            </div>
        </div>
    </div>

    <div id="painel-info" class="painel">
        <div class="conteudo-painel">
            <img id="img-astro" src="" alt="">
            <h2 id="titulo-astro"></h2>
            <p id="desc-astro"></p>
            <button onclick="fecharPainel()">Retornar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
