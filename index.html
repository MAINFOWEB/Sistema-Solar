<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Interface - BTI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="welcome-modal" class="modal">
        <div class="modal-content">
            <h2>Navegação Espacial</h2>
            <p>Clique e arraste o fundo para navegar.<br>Clique nos planetas para informações.</p>
            <button onclick="closeWelcome()">Iniciar Exploração</button>
        </div>
    </div>

    <div id="viewport">
        <div id="universo">
            <div class="sol" onclick="mostrarInfo('Sol', 'Estrela central do sistema solar.', 'assets/img/sol.jpg')">
                <span class="label-fixa">SOL</span>
            </div>

            <div class="orbita" style="width: 200px; height: 200px; animation-duration: 10s;">
                <div class="planeta" style="background:#888; width:14px; height:14px; left:-7px;" onclick="mostrarInfo('Mercúrio', 'O menor planeta do sistema.', 'assets/img/mercurio.jpg')">
                    <span class="label-fixa">MERCÚRIO</span>
                </div>
            </div>

            <div class="orbita" style="width: 300px; height: 300px; animation-duration: 20s;">
                <div class="planeta" style="background:#e3bb76; width:24px; height:24px; left:-12px;" onclick="mostrarInfo('Vênus', 'O planeta mais quente.', 'assets/img/venus.jpg')">
                    <span class="label-fixa">VÊNUS</span>
                </div>
            </div>

            <div class="orbita" style="width: 450px; height: 450px; animation-duration: 35s;">
                <div class="planeta" style="background:#2271b3; width:28px; height:28px; left:-14px;" onclick="mostrarInfo('Terra', 'Nossa casa.', 'assets/img/terra.jpg')">
                    <span class="label-fixa">TERRA</span>
                    <div class="container-lua">
                        <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Lua', 'Satélite natural da Terra.', 'assets/img/lua.jpg')"></div>
                    </div>
                </div>
            </div>

            <div class="orbita" style="width: 600px; height: 600px; animation-duration: 50s;">
                <div class="planeta" style="background:#e27b58; width:20px; height:20px; left:-10px;" onclick="mostrarInfo('Marte', 'O planeta vermelho.', 'assets/img/marte.jpg')">
                    <span class="label-fixa">MARTE</span>
                </div>
            </div>

            <div class="orbita" style="width: 850px; height: 850px; animation-duration: 100s;">
                <div class="planeta" style="background:#d39c7e; width:65px; height:65px; left:-32px;" onclick="mostrarInfo('Júpiter', 'O gigante gasoso.', 'assets/img/jupiter.jpg')">
                    <span class="label-fixa">JÚPITER</span>
                </div>
            </div>

            <div class="orbita" style="width: 1100px; height: 1100px; animation-duration: 160s;">
                <div class="planeta" style="background:#e2bf7d; width:55px; height:55px; left:-27px;" onclick="mostrarInfo('Saturno', 'O senhor dos anéis.', 'assets/img/saturno.jpg')">
                    <span class="label-fixa">SATURNO</span>
                    <div class="aneis"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="painel-info" class="painel">
        <img id="img-astro" src="" alt="">
        <h2 id="titulo-astro"></h2>
        <p id="desc-astro"></p>
        <button onclick="fecharPainel()">Retornar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
