<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Complete - BTI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="welcome-modal" class="modal">
        <div class="modal-content">
            <h2>Simulador do Sistema Solar</h2>
            <p>Navegação: Clique e arraste o fundo.<br>Interação: Clique nos astros.</p>
            <button onclick="closeWelcome()">Iniciar Exploração</button>
        </div>
    </div>

    <div id="viewport">
        <div id="universo">
            <div class="sol" onclick="mostrarInfo('Sol', 'Estrela central.', 'assets/img/sol.jpg')">
                <span class="label-fixa">SOL</span>
            </div>

            <div class="orbita" style="width: 160px; height: 160px; animation-duration: 8s;">
                <div class="planeta" style="background:#888; width:10px; height:10px; left:-5px;" onclick="mostrarInfo('Mercúrio', 'O menor planeta.', 'assets/img/mercurio.jpeg')">
                    <span class="label-fixa">MERCÚRIO</span>
                </div>
            </div>

            <div class="orbita" style="width: 240px; height: 240px; animation-duration: 15s;">
                <div class="planeta" style="background:#e3bb76; width:18px; height:18px; left:-9px;" onclick="mostrarInfo('Vênus', 'O mais quente.', 'assets/img/venus.jpg')">
                    <span class="label-fixa">VÊNUS</span>
                </div>
            </div>

            <div class="orbita" style="width: 350px; height: 350px; animation-duration: 25s;">
                <div class="planeta" style="background:#2271b3; width:22px; height:22px; left:-11px;" onclick="mostrarInfo('Terra', 'Nossa casa.', 'assets/img/terra.jpg')">
                    <span class="label-fixa">TERRA</span>
                    <div class="container-lua">
                        <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Lua', 'Satélite da Terra.', 'assets/img/lua.jpg')"></div>
                    </div>
                </div>
            </div>

            <div class="orbita" style="width: 480px; height: 480px; animation-duration: 40s;">
                <div class="planeta" style="background:#e27b58; width:16px; height:16px; left:-8px;" onclick="mostrarInfo('Marte', 'Planeta vermelho.', 'assets/img/marte.jpg')">
                    <span class="label-fixa">MARTE</span>
                </div>
            </div>

            <div class="orbita" style="width: 680px; height: 680px; animation-duration: 80s;">
                <div class="planeta" style="background:#d39c7e; width:50px; height:50px; left:-25px;" onclick="mostrarInfo('Júpiter', 'O gigante gasoso.', 'assets/img/jupiter.jpg')">
                    <span class="label-fixa">JÚPITER</span>
                </div>
            </div>

            <div class="orbita" style="width: 880px; height: 880px; animation-duration: 120s;">
                <div class="planeta" style="background:#e2bf7d; width:42px; height:42px; left:-21px;" onclick="mostrarInfo('Saturno', 'Famoso pelos anéis.', 'assets/img/saturno.jpg')">
                    <span class="label-fixa">SATURNO</span>
                    <div class="aneis"></div>
                </div>
            </div>

            <div class="orbita" style="width: 1050px; height: 1050px; animation-duration: 180s;">
                <div class="planeta" style="background:#b1e1e2; width:30px; height:30px; left:-15px;" onclick="mostrarInfo('Urano', 'Gigante de gelo.', 'assets/img/urano.jpg')">
                    <span class="label-fixa">URANO</span>
                </div>
            </div>

            <div class="orbita" style="width: 1220px; height: 1220px; animation-duration: 240s;">
                <div class="planeta" style="background:#297fff; width:30px; height:30px; left:-15px;" onclick="mostrarInfo('Netuno', 'O mais distante.', 'assets/img/netuno.jpg')">
                    <span class="label-fixa">NETUNO</span>
                </div>
            </div>

            <div class="orbita" style="width: 1350px; height: 1350px; animation-duration: 300s;">
                <div class="planeta" style="background:#c39e82; width:10px; height:10px; left:-5px;" onclick="mostrarInfo('Plutão', 'Planeta anão.', 'assets/img/plutao.jpeg')">
                    <span class="label-fixa">PLUTÃO</span>
                </div>
            </div>
        </div>
    </div>

    <div id="painel-info" class="painel">
        <img id="img-astro" src="" alt="">
        <h2 id="titulo-astro"></h2>
        <p id="desc-astro"></p>
        <button onclick="fecharPainel()">Voltar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
