<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar BTI - Márcio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="universo">
        <div class="sol" onclick="mostrarInfo('Sol', 'Estrela central do sistema solar.', 'assets/img/sol.jpg')">
            <span class="label-astro">SOL</span>
        </div>

        <div class="orbita-mercurio">
            <div class="planeta mercurio" onclick="mostrarInfo('Mercúrio', 'O menor e mais rápido.', 'assets/img/mercurio.jpg')">
                <span class="label-astro">MERCÚRIO</span>
            </div>
        </div>

        <div class="orbita-venus">
            <div class="planeta venus" onclick="mostrarInfo('Vênus', 'O planeta mais quente.', 'assets/img/venus.jpg')">
                <span class="label-astro">VÊNUS</span>
            </div>
        </div>

        <div class="orbita-terra">
            <div class="planeta terra" onclick="mostrarInfo('Terra', 'Nossa casa.', 'assets/img/terra.jpg')">
                <span class="label-astro">TERRA</span>
                <div class="orbita-lua terra-lua">
                    <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Lua', 'Satélite natural da Terra.', 'assets/img/lua.jpg')"></div>
                </div>
            </div>
        </div>

        <div class="orbita-marte">
            <div class="planeta marte" onclick="mostrarInfo('Marte', 'O planeta vermelho.', 'assets/img/marte.jpg')">
                <span class="label-astro">MARTE</span>
                <div class="orbita-lua marte-lua">
                    <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Fobos', 'Uma das luas de Marte.', 'assets/img/fobos.jpg')"></div>
                </div>
            </div>
        </div>

        <div class="orbita-jupiter">
            <div class="planeta jupiter" onclick="mostrarInfo('Júpiter', 'O gigante gasoso com 79+ luas.', 'assets/img/jupiter.jpg')">
                <span class="label-astro">JÚPITER</span>
                <div class="orbita-lua jupiter-lua">
                    <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Ganímedes', 'A maior lua do sistema.', 'assets/img/ganimedes.jpg')"></div>
                </div>
            </div>
        </div>

        <div class="orbita-saturno">
            <div class="planeta saturno" onclick="mostrarInfo('Saturno', 'O senhor dos anéis.', 'assets/img/saturno.jpg')">
                <span class="label-astro">SATURNO</span>
                <div class="aneis-saturno"></div>
                <div class="orbita-lua saturno-lua">
                    <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Titã', 'Lua com atmosfera densa.', 'assets/img/tita.jpg')"></div>
                </div>
            </div>
        </div>

        <div class="orbita-urano">
            <div class="planeta urano" onclick="mostrarInfo('Urano', 'O gigante gelado inclinado.', 'assets/img/urano.jpg')">
                <span class="label-astro">URANO</span>
                <div class="orbita-lua urano-lua">
                    <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Titânia', 'Maior lua de Urano.', 'assets/img/titania.jpg')"></div>
                </div>
            </div>
        </div>

        <div class="orbita-netuno">
            <div class="planeta netuno" onclick="mostrarInfo('Netuno', 'Oitavo planeta do sistema.', 'assets/img/netuno.jpg')">
                <span class="label-astro">NETUNO</span>
                <div class="orbita-lua netuno-lua">
                    <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Tritão', 'Lua gelada de Netuno.', 'assets/img/tritao.jpg')"></div>
                </div>
            </div>
        </div>

        <div class="orbita-plutao">
            <div class="planeta plutao" onclick="mostrarInfo('Plutão', 'O eterno nono planeta.', 'assets/img/plutao.jpg')">
                <span class="label-astro">PLUTÃO</span>
                <div class="orbita-lua plutao-lua">
                    <div class="lua" onclick="event.stopPropagation(); mostrarInfo('Caronte', 'Companheira de Plutão.', 'assets/img/caronte.jpg')"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="painel-info" class="painel">
        <div class="conteudo-painel">
            <img id="img-astro" src="" alt="Astro" style="width: 150px; border-radius: 10px; margin-bottom: 10px; display: none;">
            <h2 id="titulo-astro">Selecione um Astro</h2>
            <p id="desc-astro">Clique nos planetas para explorar.</p>
            <button onclick="fecharPainel()">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
